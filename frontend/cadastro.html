<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agenda Fácil - Novo Agendamento</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app gradient-bg">
    <header class="header">
      <div class="brand">Agenda Fácil</div>
      <div class="header-actions">
        <a href="inicio.html" class="btn">Voltar</a>
      </div>
    </header>

    <main class="container small">
      <h2>Novo Agendamento</h2>
      <form id="formCadastro" class="card form-card">
        <label>Nome do solicitante <span class="required">*</span>
          <input id="nome" name="nome" type="text" required />
        </label>

        <label>Telefone <span class="required">*</span>
          <input id="telefone" name="telefone" type="tel" required maxlength="15" placeholder="(00) 00000-0000" />
        </label>
            
        <label class="full-row">Nome do profissional <span class="required">*</span>
          <input id="profissional" name="profissional" type="text" required />
        </label>

        <div class="grid-2">
          <label>Data <span class="required">*</span>
            <input id="data" name="data" type="date" required />
          </label>
          <label>Hora <span class="required">*</span>
            <input id="hora" name="hora" type="time" required />
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn primary">Salvar</button>
          <a href="index.html" class="btn">Cancelar</a>
        </div>
      </form>
    </main>

    <div id="loading" class="loading hidden"><div class="spinner"></div></div>
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
